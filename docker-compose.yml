services:
  app:
    build: ./src
    image: simpleapi:local
    container_name: simpleapi
    ports:
      - "5132:5132"

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-scan
    depends_on:
      - app
    network_mode: "service:app"
    volumes:
      - ./zap.yaml:/zap/wrk/zap.yaml:ro
      - ./reports:/zap/wrk/reports:rw
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for app to be ready..."
        until curl -sf http://localhost:5132/todos > /dev/null; do
          sleep 2
        done
        echo "App is up, starting ZAP scan..."
        zap.sh -cmd -port 8090 -autorun /zap/wrk/zap.yaml
